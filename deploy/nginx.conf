# Nginx reverse proxy config for UATAPPv1.aetheriscloudgroup.uk
# Place in: /etc/nginx/sites-available/uat-tester
# Enable:  ln -s /etc/nginx/sites-available/uat-tester /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name UATAPPv1.aetheriscloudgroup.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name UATAPPv1.aetheriscloudgroup.uk;

    # SSL - use certbot or your own certificates
    ssl_certificate     /etc/ssl/certs/aetheriscloudgroup.uk.pem;
    ssl_certificate_key /etc/ssl/private/aetheriscloudgroup.uk.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Max upload size for PractiTest CSV imports
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for real-time test progress
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Serve screenshots directly with caching
    location /api/runs/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache screenshots for 1 hour
        add_header Cache-Control "public, max-age=3600";
    }
}
