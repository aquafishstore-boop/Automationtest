name: Deploy UAT Tester
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  safe-deploy:
    name: Safe Deploy to HP Z440
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy safely (preserves all data volumes)
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.1.8
          username: aetheris
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/uat-tester
            git pull
            chmod +x deploy-safe.sh
            ./deploy-safe.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.1.8
          username: aetheris
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -sf http://localhost:3002/api/scripts > /dev/null && echo "UAT Tester is running" || echo "FAILED"

