name: Deploy UAT Tester
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  safe-deploy:
    name: Safe Deploy to HP Z440
    runs-on: uat
    steps:
      - uses: actions/checkout@v4

      - name: Deploy safely (preserves all data volumes)
        run: |
          set -e
          cd /opt/uat-tester
          git pull
          chmod +x deploy-safe.sh
          ./deploy-safe.sh

      - name: Verify deployment
        run: |
          curl -sf http://localhost:3002/api/scripts > /dev/null && echo "UAT Tester is running" || echo "FAILED"
          curl -sf http://localhost:3002/api/scripts | python3 -c 'import sys,json;d=json.load(sys.stdin);print(f"{len(d)} scripts loaded")'
